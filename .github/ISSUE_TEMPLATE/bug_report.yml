name: 🐛 Bug Report
description: Something isn't working right
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the form below.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, concise description of the bug.
      placeholder: When I do X, Y happens instead of Z.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open the game with seed `0xDEADBEEF`
        2. Click "..."
        3. Observe ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version
      placeholder: v0.1.0 or commit SHA
    validations:
      required: true

  - type: dropdown
    id: where
    attributes:
      label: Where?
      multiple: false
      options:
        - Engine (Rust)
        - Frontend (SvelteKit)
        - Determinism (server vs client mismatch)
        - Build / CI
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: "e.g. Chrome 130 on Windows 11, or Firefox 132 on macOS 14"

  - type: textarea
    id: logs
    attributes:
      label: Logs / screenshots
      render: text
